<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Me</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:#fff;
    width:500px;
    padding:40px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    color:#6C63FF;
    margin-bottom:10px;
}

p{
    text-align:center;
    color:#666;
    margin-bottom:25px;
}

form{
    display:flex;
    flex-direction:column;
}

label{
    margin-bottom:5px;
    font-weight:bold;
}

input,
textarea{
    width:100%;
    padding:12px;
    margin-bottom:20px;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:16px;
}

textarea{
    resize:none;
}

button{
    background:#6C63FF;
    color:white;
    padding:12px;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#574fd6;
}

.info{
    margin-top:25px;
    text-align:center;
}

.info p{
    margin:8px 0;
}
</style>

</head>
<body>

<div class="container">

    <h1>Contact Me</h1>
    <p>Have a project or want to connect? Send me a message.</p>

    <form>

        <label>Full Name</label>
        <input type="text" placeholder="Enter your name">

        <label>Email</label>
        <input type="email" placeholder="Enter your email">

        <label>Subject</label>
        <input type="text" placeholder="Enter subject">

        <label>Message</label>
        <textarea rows="5" placeholder="Write your message"></textarea>

        <button type="submit">Send Message</button>

    </form>

    <div class="info">
        <p><strong>Email:</strong> manohari@example.com</p>
        <p><strong>Phone:</strong> +977 98XXXXXXXX</p>
        <p><strong>Location:</strong> Kathmandu, Nepal</p>
    </div>

</div>

</body>
</html>
